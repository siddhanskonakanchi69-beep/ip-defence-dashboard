<!DOCTYPE html>
<html>

<head>
<title>IP Defense Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>IP Defense Dashboard</h1>

<a href="/logout">Logout</a>

<h2>Block IP</h2>

<form method="POST" action="/block_ip">

<input type="text" name="ip" placeholder="Enter IP Address" required>

<button type="submit">Block</button>

</form>


<h2>Blocked IPs</h2>

<ul>

{% for ip in blocked_ips %}

<li>
{{ ip.ip_address }} - blocked
<a href="/unblock/{{ ip.id }}">Unblock</a>
</li>

{% endfor %}

</ul>


<h2>Logs</h2>

<ul>

{% for log in logs %}

<li>
{{ log.time }} — {{ log.message }}
</li>

{% endfor %}

</ul>

</body>
</html>
