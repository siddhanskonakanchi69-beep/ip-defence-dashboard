<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IP Defense Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1d2e 100%);
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 48px 32px;
        }
        
        .login-card {
            background: linear-gradient(135deg, #1a1d2e 0%, #2d3748 100%);
            border: 2px solid #4299e1;
            border-radius: 16px;
            padding: 48px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo h1 {
            font-size: 32px;
            margin-bottom: 8px;
            color: #63b3ed;
        }
        
        .logo p {
            color: #a0aec0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            background: #0f1117;
            border: 1px solid #2d3748;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }
        
        input::placeholder {
            color: #718096;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3182ce 0%, #2c5282 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(66, 153, 225, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .info {
            margin-top: 24px;
            padding: 16px;
            background: rgba(66, 153, 225, 0.1);
            border-left: 4px solid #4299e1;
            border-radius: 6px;
            font-size: 13px;
            color: #cbd5e0;
        }
        
        .demo-creds {
            margin-top: 16px;
            padding: 12px;
            background: rgba(104, 211, 145, 0.1);
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #68d391;
        }
        
        .error {
            color: #fc8181;
            font-size: 13px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="logo">
            <h1>🛡️</h1>
            <p>IP Defense Dashboard</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="admin" 
                    required 
                    autofocus
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter password" 
                    required
                >
            </div>
            
            <button type="submit" class="btn">Login</button>
            
            <div class="info">
                🔐 <strong>Real-time cybersecurity traffic monitoring</strong>
                <div class="demo-creds">
                    Demo: username=admin<br>password=admin123
                </div>
            </div>
            
            <div class="info">
                ✨ Features:<br>
                • Live IP tracking<br>
                • Request monitoring<br>
                • Threat detection<br>
                • Auto-blocking
            </div>
        </form>
    </div>
</div>

</body>
</html>
